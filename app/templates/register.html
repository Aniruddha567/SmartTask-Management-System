{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="glass-panel auth-panel">
        <div class="auth-header">
            <div class="logo-icon"><i class='bx bx-user-plus'></i></div>
            <h2>Create Account</h2>
            <p>Join to manage your tasks effectively</p>
        </div>
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class='bx bx-user'></i>
                    <input type="text" id="username" required placeholder="Choose a username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('views.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (response.ok) {
                showToast('Registration successful! Please login.', 'success');
                setTimeout(() => { window.location.href = '/login'; }, 1500);
            } else {
                showToast(data.error || 'Registration failed', 'error');
            }
        } catch (error) {
            showToast('Network error', 'error');
        }
    });
</script>
{% endblock %}
